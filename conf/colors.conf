# colors.conf - File type color mappings for HackFM
# Based on Midnight Commander default color scheme (default.ini + filehighlight.ini)
#
# Format:  extension   color_name
# Special: dir         color for directories
#          exe         color for executables (always checked first, overrides extension)
#
# Compound extensions (e.g. tar.gz) must appear BEFORE simple ones — first match wins.
#
# Available colors: black, red, green, yellow, blue, magenta, cyan, white,
#                   bright_black, bright_red, bright_green, bright_yellow,
#                   bright_blue, bright_magenta, bright_cyan, bright_white

# Directories and executables (MC: white, brightgreen)
dir             bright_white
exe             bright_green

# Archives (MC: brightmagenta)
