# HackFM Quick Directory Jump
# Format: "key" "/path/to/directory" "Label"
# Press Ctrl-D in a panel to open this menu.
# Navigate with arrows + Enter, or press the key directly to jump instantly.

"h" "/home/$USER" "Home"
"d" "~/Downloads" "Downloads"
"c" "~/Documents" "Documents"
"w" "~/.wine" "Wine Directory"
